# Premarket scoring config — v6.3 (+ v6.3.1 dictionary extension)
# v6.3 adds theme-name canonicalization to close the naming gap between
# kaipan 主标签名称 (today) and fupan 题材名称 (T-1), which openclaw's
# 2026-04-24 run surfaced as the root cause of yesterday bonus not firing.
# v6.3.1 extends theme_aliases only (no code change). See
# projects/duanxianxia/docs/premarket-v6-3-theme-aliases.md.
version: "premarket_5table_v6.3"

# -------------------------------------------------------------------------
# Rank-based bonuses per auction source — unchanged since v6.1
# -------------------------------------------------------------------------
rank_scores:
  vratio:
    top_n: 40
    max_score: 12
    decay: linear
  qiangchou:
    top_n: 30
    max_score: 10
    decay: linear
  net_amount:
    top_n: 30
    max_score: 8
    decay: linear
  fengdan:
    top_n: 30
    max_score: 10
    decay: linear

# -------------------------------------------------------------------------
# Numeric-signal bonuses — unchanged since v6.1
# -------------------------------------------------------------------------
numeric_signals:
  volume_ratio_multiple:
    weak_min: 50.0
    strong_min: 150.0
    weak_score: 2
    strong_score: 5
  auction_turnover_wan:
    weak_min: 5000
    strong_min: 20000
    weak_score: 2
    strong_score: 4
  grab_strength:
    weak_min: 3.0
    strong_min: 6.0
    weak_score: 2
    strong_score: 4
  main_net_inflow_wan:
    weak_min: 3000
    strong_min: 10000
    weak_score: 2
    strong_score: 4
  fengdan_925_yi:
    weak_min: 0.3
    strong_min: 1.0
    weak_score: 3
    strong_score: 6

# -------------------------------------------------------------------------
# Cross-source confirmation bonus — unchanged since v6.2
# -------------------------------------------------------------------------
source_hit_bonuses:
  two_sources: 2
  three_sources: 6
  four_sources: 10

# -------------------------------------------------------------------------
# Direction consistency — unchanged since v6.2
# -------------------------------------------------------------------------
direction_consistency:
  min_pct: 2.0
  score: 2

# -------------------------------------------------------------------------
# Untradable filter — unchanged
# -------------------------------------------------------------------------
untradable:
  upper_limit_pct: 9.7
  exclude_prefixes: []

# -------------------------------------------------------------------------
# Theme overlay
# v6.3 additions:
#   - theme_aliases: groups of equivalent names; first element is canonical.
#     Applied in both (a) candidate concept ↔ kaipan plate matching and
#     (b) today's matched_themes ↔ fupan hot_themes matching.
#   - fuzzy_substring (opt-in): bidirectional substring match fallback.
# v6.3.1 extensions (dictionary-only, no code change):
#   - 半导体产业链 group: +芯片封测 / 封测 / 先进封装 / CPU  (covers 000066, 002156)
#   - 算力 group: +数据中心 / AI智能体                     (covers 300444, 688787)
#   - new 大消费 group: 零售 / 服装家纺 / 猪肉 / 农业 / 食品饮料 (covers 301116, 600694, 603363)
# -------------------------------------------------------------------------
theme_overlay:
  strength_floor: 0.5
  main_inflow_min_wan: 2000
  top_n_themes: 25
  use_subplates: true
  match_bonus: 5
  subplate_match_bonus: 3
  # Each inner list is a group of names treated as equivalent. The first
  # element is the canonical form (only matters for debug output). Add/remove
  # groups here; no code change required. Leave empty to disable aliases.
  theme_aliases:
    - ["业绩增长", "一季报增长", "年报增长", "业绩预增", "预增", "半年报增长"]
    - ["半导体产业链", "芯片", "集成电路", "元器件", "芯片封测", "封测", "先进封装", "CPU"]
    - ["光通信", "通信", "光模块", "CPO"]
    - ["华为", "华为海思", "华为产业链", "鸿蒙"]
    - ["算力", "算力概念", "AI算力", "AI服务器", "IDC", "数据中心", "AI智能体"]
    - ["大消费", "零售", "服装家纺", "猪肉", "农业", "食品饮料"]
  # Opt-in: when true, two theme names match if one contains the other and
  # the shorter has >= fuzzy_substring_min_len characters. Default off since
  # it can over-trigger on short names.
  fuzzy_substring: false
  fuzzy_substring_min_len: 3

# -------------------------------------------------------------------------
# Risk penalty — unchanged
# -------------------------------------------------------------------------
risk_penalty:
  crowded_zt_count: 8
  crowded_penalty: -3
  large_outflow_yuan: -500000000
  large_outflow_penalty: -2

# -------------------------------------------------------------------------
# Market regime — unchanged
# -------------------------------------------------------------------------
market_regime:
  QX:
    cold_max: 30
    hot_min: 70
  HSLN_premarket:
    cold_max: -1.5
    hot_min: 2.0
  KQXY:
    cold_min: 60
    hot_max: 35
  ZTBX:
    cold_max: 0
    hot_min: 3
  LBBX:
    cold_max: 0
    hot_min: 5
  PBBX:
    cold_max: 30
    hot_min: 60
  PB:
    cold_max: 40
    hot_min: 70
  regime_multipliers:
    cold: 0.8
    normal: 1.0
    hot: 1.1

# -------------------------------------------------------------------------
# Yesterday (T-1) postmarket anchoring — unchanged since v6.1
# -------------------------------------------------------------------------
yesterday_postmarket:
  min_board_count: 2
  min_theme_stock_count: 3
  theme_weight: 3
  leader_weight: 5
  ltgd_cycles_to_use: ["5日", "10日"]
  ltgd_min_range_pct: 20
  ltgd_weight: 2

# -------------------------------------------------------------------------
# Output shaping
# -------------------------------------------------------------------------
output:
  max_candidates: 50
  include_debug: true
  round_scores_to: 2

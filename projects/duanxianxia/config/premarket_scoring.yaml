# Premarket scoring config — v6.2
# Tuned from openclaw's 2026-04-24 mid-day live run. See
# projects/duanxianxia/docs/premarket-v6-2-tuning.md for per-threshold rationale.
version: "premarket_5table_v6.2"

# -------------------------------------------------------------------------
# Rank-based bonuses per auction source — validated in 2026-04-24, unchanged
# -------------------------------------------------------------------------
rank_scores:
  vratio:
    top_n: 40
    max_score: 12
    decay: linear
  qiangchou:
    top_n: 30
    max_score: 10
    decay: linear
  net_amount:
    top_n: 30
    max_score: 8
    decay: linear
  fengdan:
    top_n: 30
    max_score: 10
    decay: linear

# -------------------------------------------------------------------------
# Numeric-signal bonuses — validated in 2026-04-24, unchanged
# -------------------------------------------------------------------------
numeric_signals:
  volume_ratio_multiple:
    weak_min: 50.0
    strong_min: 150.0
    weak_score: 2
    strong_score: 5
  auction_turnover_wan:
    weak_min: 5000
    strong_min: 20000
    weak_score: 2
    strong_score: 4
  grab_strength:
    weak_min: 3.0
    strong_min: 6.0
    weak_score: 2
    strong_score: 4
  main_net_inflow_wan:
    weak_min: 3000
    strong_min: 10000
    weak_score: 2
    strong_score: 4
  fengdan_925_yi:
    weak_min: 0.3
    strong_min: 1.0
    weak_score: 3
    strong_score: 6

# -------------------------------------------------------------------------
# Cross-source confirmation bonus
# v6.2: two_sources dropped 3 → 2 (was too automatic — 9/10 top-10 got it)
# -------------------------------------------------------------------------
source_hit_bonuses:
  two_sources: 2
  three_sources: 6
  four_sources: 10

# -------------------------------------------------------------------------
# Direction consistency
# v6.2: added min_pct=2.0 (previously fired for any auction>0 AND latest>0)
# -------------------------------------------------------------------------
direction_consistency:
  min_pct: 2.0
  score: 2

# -------------------------------------------------------------------------
# Untradable filter — unchanged
# -------------------------------------------------------------------------
untradable:
  upper_limit_pct: 9.7
  exclude_prefixes: []

# -------------------------------------------------------------------------
# Theme overlay
# v6.2: widened top_n 15 → 25, lowered strength_floor 1.0 → 0.5,
# raised match_bonus 4 → 5, subplate_match_bonus 2 → 3
# -------------------------------------------------------------------------
theme_overlay:
  strength_floor: 0.5
  main_inflow_min_wan: 2000
  top_n_themes: 25
  use_subplates: true
  match_bonus: 5
  subplate_match_bonus: 3

# -------------------------------------------------------------------------
# Risk penalty — unchanged (fired correctly on 688041 海光信息)
# -------------------------------------------------------------------------
risk_penalty:
  crowded_zt_count: 8
  crowded_penalty: -3
  large_outflow_yuan: -500000000
  large_outflow_penalty: -2

# -------------------------------------------------------------------------
# Market regime — unchanged
# -------------------------------------------------------------------------
market_regime:
  QX:
    cold_max: 30
    hot_min: 70
  HSLN_premarket:
    cold_max: -1.5
    hot_min: 2.0
  KQXY:
    cold_min: 60
    hot_max: 35
  ZTBX:
    cold_max: 0
    hot_min: 3
  LBBX:
    cold_max: 0
    hot_min: 5
  PBBX:
    cold_max: 30
    hot_min: 60
  PB:
    cold_max: 40
    hot_min: 70
  regime_multipliers:
    cold: 0.8
    normal: 1.0
    hot: 1.1

# -------------------------------------------------------------------------
# Yesterday (T-1) postmarket anchoring
# -------------------------------------------------------------------------
yesterday_postmarket:
  min_board_count: 2
  min_theme_stock_count: 3
  theme_weight: 3
  leader_weight: 5
  ltgd_cycles_to_use: ["5日", "10日"]
  ltgd_min_range_pct: 20
  ltgd_weight: 2

# -------------------------------------------------------------------------
# Output shaping
# -------------------------------------------------------------------------
output:
  max_candidates: 50
  include_debug: true
  round_scores_to: 2
